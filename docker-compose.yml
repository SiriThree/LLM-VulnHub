services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: llm_vulnhub
      POSTGRES_USER: llm_vulnhub
      POSTGRES_PASSWORD: llm_vulnhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_pgvector.sql:/docker-entrypoint-initdb.d/init_pgvector.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://llm_vulnhub:llm_vulnhub@postgres:5432/llm_vulnhub
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    ports:
      - "8001:8000"
    volumes:
      - ./data:/data:ro
    depends_on:
      - postgres
      - redis

  worker:
    build: ./backend
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://llm_vulnhub:llm_vulnhub@postgres:5432/llm_vulnhub
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    volumes:
      - ./data:/data:ro
    depends_on:
      - backend
      - redis

  beat:
    build: ./backend
    command: celery -A app.worker.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://llm_vulnhub:llm_vulnhub@postgres:5432/llm_vulnhub
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - worker
      - redis

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8001/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
